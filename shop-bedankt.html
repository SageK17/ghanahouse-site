<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0B08" />
  <meta name="robots" content="noindex" />
  <title data-nl="Bedankt voor je bestelling — Ghana House" data-en="Thank you for your order — Ghana House">Bedankt — Ghana House</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="brand-logo">
        <img src="logo.png" alt="Ghana House" />
        <div class="brand-logo-text"><span>Ghana House</span><small>Extensions × Barber</small></div>
      </a>
      <nav class="main-nav">
        <a href="/services"><span data-lang="nl">Diensten</span><span data-lang="en">Services</span></a>
        <a href="/booking"><span data-lang="nl">Boeken</span><span data-lang="en">Book</span></a>
        <a href="/shop">Shop</a>
        <a href="/visit"><span data-lang="nl">Bezoek</span><span data-lang="en">Visit</span></a>
        <a href="/about"><span data-lang="nl">Over ons</span><span data-lang="en">About</span></a>
        <a href="/faq">FAQ</a>
      </nav>
      <div class="header-actions">
        <button class="lang-toggle" type="button" id="langToggle" aria-label="Switch language"><span class="lang-nl">NL</span><span style="opacity:.4">/</span><span class="lang-en">EN</span></button>
      </div>
    </div>
  </header>

  <main id="main" style="padding-top: 130px;">
    <section class="section-noir" style="min-height: 60vh;">
      <div class="container-narrow">
        <div class="bedankt" id="bedankt">
          <div class="bedankt-badge wait" id="badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          </div>
          <h1 class="section-title" id="bedanktTitle" style="font-size: clamp(28px,5vw,44px);"><span data-lang="nl">Je betaling wordt verwerkt…</span><span data-lang="en">Processing your payment…</span></h1>
          <p class="section-intro" id="bedanktMsg" style="margin: 16px auto 28px;"><span data-lang="nl">Een moment geduld terwijl we je bestelling bevestigen.</span><span data-lang="en">One moment while we confirm your order.</span></p>
          <div id="bedanktActions" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
            <a href="/shop" class="btn btn-outline"><span data-lang="nl">Terug naar de shop</span><span data-lang="en">Back to shop</span></a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js?v=6"></script>
  <script>
  (function () {
    var API_BASE = window.GHANAHOUSE_API || 'https://admin.ghanahouse.nl';
    var ref = new URLSearchParams(location.search).get('ref');
    var badge = document.getElementById('badge');
    var titleEl = document.getElementById('bedanktTitle');
    var msgEl = document.getElementById('bedanktMsg');
    var lang = document.documentElement.lang === 'en' ? 'en' : 'nl';
    function t(nl, en) { return lang === 'en' ? en : nl; }
    function show(badgeClass, icon, title, msg) {
      badge.className = 'bedankt-badge ' + badgeClass;
      badge.innerHTML = icon;
      titleEl.textContent = title; msgEl.textContent = msg;
    }
    var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
    var CROSS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
    if (!ref) { show('ok', CHECK, t('Bedankt!', 'Thank you!'), t('Je bestelling is geplaatst.', 'Your order has been placed.')); return; }

    var tries = 0;
    function poll() {
      fetch(API_BASE + '/api/shop/order/' + encodeURIComponent(ref))
        .then(function (r) { return r.json(); })
        .then(function (o) {
          if (o.status === 'paid' || o.status === 'shipped') {
            try { localStorage.removeItem('gh-cart'); } catch (e) {}
            show('ok', CHECK, t('Bedankt voor je bestelling!', 'Thank you for your order!'),
              t('We hebben je betaling ontvangen (' + ref + '). Je krijgt een bevestiging per e-mail.',
                'We received your payment (' + ref + '). You will get a confirmation by email.'));
          } else if (o.status === 'open' && tries < 8) {
            tries++; setTimeout(poll, 1500);
          } else if (o.status === 'open') {
            show('wait', null, t('Betaling nog niet bevestigd', 'Payment not yet confirmed'),
              t('Het kan even duren. Je krijgt vanzelf een e-mail zodra de betaling rond is.', 'It can take a moment. You will receive an email once payment is complete.'));
            badge.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
          } else {
            show('fail', CROSS, t('Betaling niet gelukt', 'Payment unsuccessful'),
              t('Er is niets afgeschreven. Probeer het opnieuw of stuur ons een WhatsApp.', 'Nothing was charged. Please try again or send us a WhatsApp.'));
          }
        })
        .catch(function () {
          show('ok', CHECK, t('Bedankt!', 'Thank you!'), t('Je bestelling is geplaatst. Je krijgt bericht per e-mail.', 'Your order is placed. You will get an email.'));
        });
    }
    poll();
  })();
  </script>
</body>
</html>
